name: Market Breadth Daily

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install akshare pandas -i https://pypi.tuna.tsinghua.edu.cn/simple
    
    - name: Run script
      run: python market_breadth.py
      continue-on-error: true  # 即使失败也继续
    
    - name: Check output
      run: ls -la output/ || echo "No output directory"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: always()  # 即使失败也上传
      with:
        name: market-breadth-data
        path: output/*.csv
        if-no-files-found: ignore
